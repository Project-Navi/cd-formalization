name = "CdFormal"
version = "0.2.0"
keywords = ["math"]
defaultTargets = ["CdFormal"]
lintDriver = "batteries/runLinter"

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
autoImplicit = false
maxHeartbeats = 200000
# Mathlib standard linter set (docBlame, simpNF, unusedArguments, etc.)
weak.linter.mathlibStandardSet = true
# Style linters (longLine, lambda, dollar, cdot, missingEnd)
linter.style.longLine = true
linter.style.lambdaSyntax = true
linter.style.dollarSyntax = true
linter.style.cdot = true
linter.style.missingEnd = true

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

[[lean_lib]]
name = "CdFormal"
