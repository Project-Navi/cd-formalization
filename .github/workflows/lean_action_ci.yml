name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install elan
        run: |
          curl https://elan.zulipchat.com/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Mathlib .olean files
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.elan
            .lake
          key: lean-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
          restore-keys: lean-

      - name: Get Mathlib cache
        run: lake exe cache get || true

      - name: Build (fail on sorry)
        run: lake build --wfail

      - name: Check for sorry contamination
        run: |
          echo "Checking axiom dependencies..."
          # Force re-elaboration so cached oleans can't hide a sorry
          touch CdFormal/Verify.lean
          lake env lean CdFormal/Verify.lean 2>&1 | tee verify_output.txt
          if grep -q "sorryAx" verify_output.txt; then
            echo "FATAL: sorryAx found in verified theorems!"
            exit 1
          fi
          echo "No sorry contamination detected."
